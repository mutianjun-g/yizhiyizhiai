<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 苹果关键视口兼容，禁止缩放、适配刘海屏 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💌 专属心动告白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", -apple-system, BlinkMacSystemFont, sans-serif;
            /* 取消苹果点击灰色高亮 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #FFF0F5;
            overflow: hidden;
            /* 修复苹果滚动回弹、页面滑动穿透 */
            position: fixed;
            width: 100vw;
            height: 100vh;
            -webkit-overflow-scrolling: none;
        }

        .confession-window {
            width: min(650px, 90vw);
            height: auto;
            min-height: 420px;
            background: #FFF0F5;
            position: fixed;
            top: 50%;
            left: 50%;
            /* 苹果transform模糊修复 */
            transform: translate(-50%, -50%);
            -webkit-transform: translate(-50%, -50%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 133, 161, 0.3);
            z-index: 999;
            /* 开启硬件加速，Safari流畅 */
            will-change: transform;
        }

        .title {
            font-size: 16px;
            font-weight: bold;
            color: #FF477E;
            margin: 30px 0 10px;
        }

        .main-text {
            font-size: 20px;
            font-weight: bold;
            color: #FF2E63;
            margin: 10px 0 20px;
            line-height: 1.6;
        }

        .tip {
            font-size: 12px;
            color: #FF85A1;
        }

        .coax {
            font-size: 14px;
            font-weight: bold;
            color: #FF2E63;
            margin: 15px 0;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: min(80px, 10vw);
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn-yes {
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            background: #FF85A1;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            /* 苹果按钮圆角渲染修复 */
            -webkit-appearance: none;
            appearance: none;
        }

        .btn-yes:hover {
            background: #FF5C8A;
        }

        .btn-no {
            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            background: #E6E6E6;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .btn-no:hover {
            background: #CCCCCC;
        }

        .float-text {
            position: fixed;
            width: 90px;
            height: 40px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 6px;
            font-size: 10px;
            z-index: 10;
            user-select: none;
            -webkit-user-select: none;
            will-change: left, top;
        }
    </style>
</head>

<body>
    <div class="confession-window" id="confession">
        <div class="title">叮咚~你的专属告白请查收💌</div>
        <div class="main-text">我喜欢你，你愿意做我的女朋友吗💖</div>
        <div class="tip">认真考虑一下哦~</div>
        <div class="coax" id="coax"></div>

        <div class="btn-group">
            <button class="btn-yes" id="yesBtn">我愿意💖</button>
            <button class="btn-no" id="noBtn">不愿意</button>
        </div>
    </div>

    <script>
        // 修复：苹果移动端禁用beforeunload（移动端无效且卡顿）
        if (!/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            window.onbeforeunload = function () {
                return "乖乖选一个才能走哦~";
            };
        }

        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const coax = document.getElementById('coax');
        const confession = document.getElementById('confession');

        let yesSize = 18;
        let noSize = 16;
        const minNoSize = 8;

        const coaxTexts = [
            "真的不考虑一下吗？",
            "呜呜不要嘛~",
            "再看看我呀✨",
            "不许拒绝我哼😤",
            "再给一次机会好不好~"
        ];

        noBtn.onclick = function () {
            yesSize += 16;
            if (noSize > minNoSize) noSize -= 4;

            yesBtn.style.fontSize = yesSize + "px";
            noBtn.style.fontSize = noSize + "px";
            coax.innerText = coaxTexts[Math.floor(Math.random() * coaxTexts.length)];
        };

        yesBtn.onclick = function () {
            confession.style.display = "none";
            startHeartAnimation();
        };

        // ====================== 苹果Safari兼容爱心动画 ======================
        function startHeartAnimation() {
            const texts = ["好好吃饭", "好好爱自己", "少吃凉的", "照顾好自己", "我想你了", "天天开心",
                "保持好心情", "多赚一点", "别熬夜", "你是小公主"];

            const colors = ["#FF6B6B", "#FFD1DC", "#D946EF", "#6366F1", "#4ADE80", "#FACC15",
                "#F97316", "#8B5CF6", "#EC4899", "#10B981"];

            const w = window.innerWidth;
            const h = window.innerHeight;
            const centerX = w / 2;
            const centerY = h / 2;

            function getHeartPoints() {
                const points = [];
                const total = 360;
                for (let t = 0; t < total; t++) {
                    const theta = 2 * Math.PI * t / total;
                    // 修复苹果低版本Safari不支持 ** 立方运算符，改用 Math.pow
                    const sinT = Math.sin(theta);
                    let x = 16 * Math.pow(sinT, 3);
                    let y = 13 * Math.cos(theta) - 5 * Math.cos(2 * theta) - 2 * Math.cos(3 * theta) - Math.cos(4 * theta);
                    const scale = 30;
                    x = centerX + x * scale;
                    y = (centerY - 140) - y * scale;
                    points.push([x, y]);
                }
                return points;
            }

            const heartPoints = getHeartPoints();
            const heartElements = [];

            function drawHeartStep(i) {
                if (i >= heartPoints.length) {
                    setTimeout(explode, 1000);
                    return;
                }
                const [x, y] = heartPoints[i];
                const text = texts[Math.floor(Math.random() * texts.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];

                const el = document.createElement('div');
                el.className = "float-text";
                el.style.left = x - 45 + "px";
                el.style.top = y - 20 + "px";
                el.style.background = color;
                el.innerText = text;
                document.body.appendChild(el);
                heartElements.push(el);

                setTimeout(() => drawHeartStep(i + 1), 50);
            }

            drawHeartStep(0);

            function explode() {
                heartElements.forEach(el => el.style.display = "none");
                let count = 0;
                const max = 700;

                function burst() {
                    if (count >= max) return;
                    count++;

                    const tx = texts[Math.floor(Math.random() * texts.length)];
                    const co = colors[Math.floor(Math.random() * colors.length)];
                    const rx = Math.random() * (w - 90);
                    const ry = Math.random() * (h - 40);

                    const el = document.createElement('div');
                    el.className = "float-text";
                    el.style.left = rx + "px";
                    el.style.top = ry + "px";
                    el.style.background = co;
                    el.innerText = tx;
                    document.body.appendChild(el);

                    setTimeout(burst, 3);
                }
                burst();
            }
        }
    </script>
</body>
</html>
